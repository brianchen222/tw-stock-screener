name: 每日選股更新

on:
  schedule:
    # 06:00 UTC = 14:00 台北時間,週一~週五(台股 13:30 收盤後)
    - cron: '0 6 * * 1-5'
  workflow_dispatch: {}   # 也可在 Actions 頁手動觸發

permissions:
  contents: write   # 把每天補好的 data/ commit 回 repo
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝中文字型(圖表用)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 補當日資料 + 選股 + 產報告與圖
        run: python run.py --market both --append

      - name: 把補好的當日資料 commit 回 repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: 更新 $(date -u +%Y-%m-%d)" || echo "今日無資料變動"
          git push || echo "push 略過"

      - name: 首頁導向功能總覽
        run: cp output/home.html output/index.html

      - name: 上傳 Pages 內容
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 發布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
